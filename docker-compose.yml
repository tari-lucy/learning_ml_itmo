services:

  app:
    build: ./app
    container_name: meetingscribe-app
    restart: "no"
    env_file: ./app/.env
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal

  web-proxy:
    image: nginx:1.27-alpine
    container_name: meetingscribe-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    container_name: meetingscribe-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal

  database:
    image: postgres:15
    container_name: meetingscribe-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetingscribe
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal


volumes:
  db-data:
  rabbitmq-data:


networks:
  internal:
    driver: bridge
