services:

  app:
    build: ./app
    container_name: meetingscribe-app
    restart: unless-stopped
    env_file: ./app/.env
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal

  web-proxy:
    image: nginx:1.27-alpine
    container_name: meetingscribe-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - internal

  webview:
    build: ./webview/
    container_name: meetingscribe-webview
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./webview:/webview
    depends_on:
      app:
        condition: service_started
    networks:
      - internal


  rabbitmq:
    image: rabbitmq:3-management
    container_name: meetingscribe-rabbitmq
    restart: always
    env_file: ./app/.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  database:
    image: postgres:15
    container_name: meetingscribe-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetingscribe
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  worker-1:
    build: ./app
    container_name: meetingscribe-worker-1
    restart: always
    env_file: ./app/.env
    environment:
      WORKER_ID: worker-1
    command: python -m worker.consumer
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - internal

  worker-2:
    build: ./app
    container_name: meetingscribe-worker-2
    restart: always
    env_file: ./app/.env
    environment:
      WORKER_ID: worker-2
    command: python -m worker.consumer
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - internal


volumes:
  db-data:
  rabbitmq-data:


networks:
  internal:
    driver: bridge

