services:

  app:
    build: ./app
    container_name: meetingscribe-app
    restart: always
    env_file: ./app/.env
    volumes:
      - ./app/src:/app/src
    depends_on:
      - database
      - rabbitmq
    networks:
      - internal

  web-proxy:
    image: nginx:1.27-alpine
    container_name: meetingscribe-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    container_name: meetingscribe-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal

  database:
    image: postgres:15
    container_name: meetingscribe-db
    restart: always
    env_file: ./app/.env
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  db-data:
  rabbitmq-data:


networks:
  internal:
    driver: bridge
